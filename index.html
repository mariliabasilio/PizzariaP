<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Barão Pizzaria</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <nav>
            <ul>
                <li><button>Início</button></li>
                <li><button>Promoções</button></li>
                <li><button>Minha Conta</button></li>
            </ul>
        </nav>
    </header>

    <section class="perfil">
            <img src="imagens/fundo.jpg" class="img-fundo">
            <div>
                <img src="imagens/logo.jpg" alt="Logo da Pizzaria">
            </div>
    </section>

    <section class="filtros">
        <input type="text" placeholder="Buscar produto">
    </section>

    <section class="destaques">

        <div class="card"> 
            <img src="calabresa.jpg" alt="Pizza Calabresa">
            <h3>Pizza Calabresa</h3>
            <p class="preco">R$ 39,90</p>
            <button onclick="adicionarCarrinho('Pizza Calabresa',39.90)">
                Pedir
            </button>
        </div>

        <div class="card">
            <img src="portuguesa.jpg" alt="Pizza Portuguesa">

            <h3>Pizza Portuguesa</h3>

            <p class="preco">R$ 44,90</p>

            <button onclick="adicionarCarrinho('Pizza Portuguesa',44.90)">
                Pedir
            </button>
        </div>

        <div class="card">
            <img src="frango.jpg" alt="Pizza Frango">

            <h3>Pizza Frango</h3>

            <p class="preco">R$ 49,90</p>

            <button onclick="adicionarCarrinho('Pizza Frango',49.90)">
                Pedir
            </button>
        </div>

    </section>

    <section class="tabela-pedidos">
        <h2>Pedidos</h2>

        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Cliente</th>
                    <th>Pizza</th>
                    <th>Tamanho</th>
                    <th>Ações</th>
                </tr>
            </thead>

            <tbody>
                <tr>
                    <td>1</td>
                    <td>Marília</td>
                    <td>Calabresa</td>
                    <td>Grande</td>
                    <td>
                        <button class="editar">
                            Editar
                        </button>
                        <button class="excluir">
                            Excluir
                        </button>
                    </td>
                </tr>
            </tbody>
        </table>
    </section>

    <aside>
        <div class="carrinho">
            <h2>🛒 Carrinho</h2>

            <ul id="lista-carrinho"></ul>

            <h3>Total: R$ <span id="total">0.00</span></h3>
        </div>
    </aside>

    <footer class="footer">
        <p>© 2026 Barão - Sistema CRUD de Pizzaria!</p>
    </footer>

    <script src="script.js"></script>

</body>
</html>
