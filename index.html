<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Barão Pizzaria</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <nav>
        <div class="menu">
            <button>Início</button>

            <button onclick="window.location.href='promo.html'">
                Promoções
            </button>

            <button id="btnCadastro">
                Minha Conta
            </button>

            <button id="btnCarrinho" class="btn-carrinho">
                🛒 <span id="quantidade">0</span>
            </button>
        </div>
    </nav>
</header>

<div id="overlay" class="overlay">
    <div class="modal">
        <button class="fechar">&times;</button>

        <h2>Informe seu número</h2>

        <input type="text" placeholder="Telefone">

        <button>Confirmar</button>
    </div>
</div>

<section class="perfil">
    <img src="imagens/barao.jpg" class="img-fundo" alt="Banner da Pizzaria">
</section>

<section class="filtros">
    <input type="text" placeholder="Buscar produto">
</section>

<section class="destaques">

    <div class="card">
        <img src="imagens/calabresa.jpg" alt="Pizza Calabresa">

        <h3>Pizza Calabresa</h3>

        <p class="preco">R$ 39,90</p>

        <button onclick="adicionarCarrinho('Pizza Calabresa',39.90)">
            Pedir
        </button>
    </div>

    <div class="card">
        <img src="imagens/portuguesa.jpg" alt="Pizza Portuguesa">

        <h3>Pizza Portuguesa</h3>

        <p class="preco">R$ 44,90</p>

        <button onclick="adicionarCarrinho('Pizza Portuguesa',44.90)">
            Pedir
        </button>
    </div>

    <div class="card">
        <img src="imagens/frango.jpg" alt="Pizza Frango">

        <h3>Pizza Frango</h3>

        <p class="preco">R$ 49,90</p>

        <button onclick="adicionarCarrinho('Pizza Frango',49.90)">
            Pedir
        </button>
    </div>

</section>

<div id="painelCarrinho" class="painel-carrinho">
    <h2> Seu Pedido 🛒</h2>

    <ul id="listaCarrinho">
        <li>Nenhum item adicionado</li>
    </ul>

    <p>
        <strong>Total:</strong>
        R$ <span id="total">0.00</span>
    </p>

    <button class="finalizar">
        Finalizar Pedido
    </button>
</div>

<footer class="footer">
    <p>© 2026 Barão - Sistema CRUD de Pizzaria!</p>
</footer>

<script src="script.js"></script>

</body>
</html>
