<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Barão Pizzaria</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <nav>
        <div class="menu">
            <button onclick="window.location.href='index.html'">
                Início
            </button>

            <button onclick="window.location.href='promo.html'">
                Promoções
            </button>

            <button id="btnCadastro">
                Minha Conta
            </button>

            <button id="btnCarrinho" class="btn-carrinho">
                🛒 <span id="quantidade">0</span>
            </button>
        </div>
    </nav>
</header>

    <section class="perfil">
        <img src="imagens/barao.jpg" class="img-fundo">

    </section>


    <section class="filtros">
        <input type="text" placeholder="Buscar produto">
    </section>

    <section class="destaques">

        <div class="card"> 
            <img src="imagens/promo1.jpg" alt="promo">

            <h3>Promo Super Calabresa</h3>

            <p class="preco">R$ 89,90</p>

            <button onclick="adicionarCarrinho('P.Super Calabresa',89.90)">
                Pedir
            </button>
        </div>

        <div class="card">
            <img src="imagens/promo2.jpg" alt="promo">

            <h3>Pizza frango + Brotinho</h3>

            <p class="preco">R$ 54,90</p>

            <button onclick="adicionarCarrinho('P.Pizza Frango + Brotinho',54.90)">
                Pedir
            </button>
        </div>


    </section>

    <div id="painelCarrinho" class="painel-carrinho">
        <h2> Seu Pedido 🛒</h2>

        <ul id="listaCarrinho">
            <li>Nenhum item adicionado</li>
        </ul>

        <p>
            <strong>Total:</strong>
            R$ <span id="total">0.00</span>
        </p>

        <button class="finalizar">
            Finalizar Pedido
        </button>
    </div>

    <footer class="footer">
        <p>© 2026 Barão - Sistema CRUD de Pizzaria!</p>
    </footer>

    <script src="script.js"></script>

</body>
</html>
