<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Barão Pizzaria/promocao</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <nav>
            <ul>

                <button onclick="window.location.href='index.html'" >Início</button>
                <button>Promoções</button>

                <button id="btnCadastro">Minha Conta</button>

                <div id="overlay" class="overlay">
                    <div class="modal">
                        <button class="fechar">&times;</button>
                        <h2>Informe seu número</h2>
                        <input type="text" placeholder="Telefone">
                        <button>Confirmar</button>
                    </div>
                </div>

            </ul>
        </nav>
    </header>

    <section class="perfil">
        <img src="imagens/barao.jpg" class="img-fundo">

    </section>


    <section class="filtros">
        <input type="text" placeholder="Buscar produto">
    </section>

    <section class="destaques">

        <div class="card"> 
            <img src="imagens/promo1.jpg" alt="promo">

            <h3>Promo Super Calabresa</h3>

            <p class="preco">R$ 89,90</p>

            <button onclick="adicionarCarrinho('P.Super Calabresa',89.90)">
                Pedir
            </button>
        </div>

        <div class="card">
            <img src="imagens/promo2.jpg" alt="promo">

            <h3>Pizza frango + Brotinho</h3>

            <p class="preco">R$ 54,90</p>

            <button onclick="adicionarCarrinho('P.Pizza Frango + Brotinho',54.90)">
                Pedir
            </button>
        </div>


    </section>

    <aside>
        <div class="carrinho">
            <h2>🛒 Carrinho</h2>

            <ul id="lista-carrinho"></ul>

            <h3>Total: R$ <span id="total">0.00</span></h3>
        </div>
    </aside>

    <footer class="footer">
        <p>© 2026 Barão - Sistema CRUD de Pizzaria!</p>
    </footer>

    <script src="script.js"></script>

</body>
</html>
